<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Glow Gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Primary Mint Gradient -->
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/> <!-- Mint -->
      <stop offset="50%" stop-color="#059669"/> <!-- Emerald -->
      <stop offset="100%" stop-color="#06b6d4"/> <!-- Cyan -->
    </linearGradient>
    
    <!-- Secondary Jelly Gradient -->
    <linearGradient id="jellyGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.7"/> <!-- Blue -->
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.5"/> <!-- Purple -->
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3"/> <!-- Pink -->
    </linearGradient>
    
    <!-- Highlights -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Glowing Aura (Removed to make the logo fully transparent) -->
  <!-- <circle cx="50%" cy="50%" r="45%" fill="url(#glow)"/> -->

  <!-- Leaf Shape 1 (Back Layer - Mint) -->
  <path d="M50 15 C68 25, 78 45, 68 65 C58 85, 42 85, 32 65 C22 45, 32 25, 50 15 Z" 
        fill="url(#mintGrad)" />
        
  <!-- Leaf Vein (Dynamic Center Cut) -->
  <path d="M50 15 Q52 45 68 65" 
        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M50 15 Q48 48 32 65" 
        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M50 15 Q50 50 50 82" 
        stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Leaf Shape 2 (Front Overlay Layer - Glassy Jelly) -->
  <path d="M50 25 C62 33, 70 48, 62 62 C54 76, 46 76, 38 62 C30 48, 38 33, 50 25 Z" 
        fill="url(#jellyGrad)"/>

  <!-- Jelly Highlight Bubble -->
  <ellipse cx="44" cy="40" rx="6" ry="12" transform="rotate(-30 44 40)" fill="url(#highlight)"/>
  <circle cx="58" cy="55" r="3" fill="#ffffff" opacity="0.5"/>
</svg>
