<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Jellymint</title>
  <meta name="description" content="View and manage your Jellymint profile, token balance, and account settings.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-main);
      margin: 0;
      font-family: 'Outfit', sans-serif;
      padding: 20px;
      overflow-y: auto;
    }

    .profile-page {
      width: 100%;
      max-width: 580px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 24px;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    .back-btn:hover {
      color: var(--primary-mint);
      background: rgba(16, 185, 129, 0.08);
      border-color: rgba(16, 185, 129, 0.2);
    }

    /* Profile Header Card */
    .profile-header-card {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.12) 0%, rgba(6, 182, 212, 0.08) 50%, rgba(99, 102, 241, 0.08) 100%);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .profile-header-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
      animation: pulseGlow 6s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--primary-mint);
      position: relative;
      z-index: 1;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-main);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .profile-avatar .avatar-fallback {
      font-size: 2.5rem;
      color: var(--primary-mint);
    }

    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--primary-mint), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .profile-email {
      color: var(--text-muted);
      font-size: 0.95rem;
      position: relative;
      z-index: 1;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: rgba(16, 185, 129, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .stat-icon {
      font-size: 1.5rem;
      margin-bottom: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }
    .stat-icon.tokens {
      background: rgba(16, 185, 129, 0.15);
      color: var(--primary-mint);
    }
    .stat-icon.tier {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent-indigo);
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Info cards */
    .info-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .info-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-card h3 i {
      color: var(--primary-mint);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }
    .info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .info-row:first-of-type {
      padding-top: 0;
    }
    .info-label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .info-value {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.9rem;
    }

    /* Tier badge */
    .tier-badge {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tier-badge.free {
      background: rgba(100, 116, 139, 0.2);
      color: #94a3b8;
    }
    .tier-badge.pro {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }
    .tier-badge.advanced {
      background: rgba(16, 185, 129, 0.2);
      color: var(--primary-mint);
    }

    /* Buttons */
    .profile-actions {
      display: flex;
      gap: 12px;
    }
    .profile-btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      font-family: 'Outfit', sans-serif;
    }
    .profile-btn.primary {
      background: linear-gradient(135deg, var(--primary-mint), var(--accent-cyan));
      color: #000;
    }
    .profile-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
    }
    .profile-btn.danger {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    .profile-btn.danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      transform: translateY(-2px);
    }

    /* Loading state */
    .profile-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
      color: var(--text-muted);
    }
    .profile-loading i {
      color: var(--primary-mint);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-header-card { padding: 30px 20px; }
      .profile-name { font-size: 1.4rem; }
      .stats-row { grid-template-columns: 1fr; }
      .profile-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="profile-page">
    <!-- Back to Chat -->
    <a href="/chat" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back to Chat
    </a>

    <!-- Loading -->
    <div id="profile-loading" class="profile-loading">
      <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
      <p>Loading your profile...</p>
    </div>

    <!-- Profile Content (hidden until loaded) -->
    <div id="profile-content" style="display: none;">
      <!-- Header Card -->
      <div class="profile-header-card">
        <div class="profile-avatar" id="profile-avatar">
          <i class="fa-solid fa-user avatar-fallback"></i>
        </div>
        <div class="profile-name" id="profile-name">Loading...</div>
        <div class="profile-email" id="profile-email">loading@email.com</div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon tokens">
            <i class="fa-solid fa-coins"></i>
          </div>
          <div class="stat-value" id="stat-tokens">--</div>
          <div class="stat-label">Token Balance</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon tier">
            <i class="fa-solid fa-crown"></i>
          </div>
          <div class="stat-value" id="stat-tier">--</div>
          <div class="stat-label">Account Tier</div>
        </div>
      </div>

      <!-- Account Details -->
      <div class="info-card">
        <h3><i class="fa-solid fa-circle-info"></i> Account Details</h3>
        <div class="info-row">
          <span class="info-label">User ID</span>
          <span class="info-value" id="info-uid" style="font-family: var(--font-mono, monospace); font-size: 0.8rem; opacity: 0.7;">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="info-email">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Tier</span>
          <span class="info-value"><span class="tier-badge free" id="info-tier-badge">FREE</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">Last Active</span>
          <span class="info-value" id="info-last-active">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Account Created</span>
          <span class="info-value" id="info-created">--</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="profile-actions">
        <button class="profile-btn primary" id="back-to-chat-btn">
          <i class="fa-solid fa-comment-dots"></i> Back to Chat
        </button>
        <button class="profile-btn danger" id="sign-out-btn">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/profile.js"></script>
</body>
</html>
