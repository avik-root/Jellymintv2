<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Jellymint</title>
  <meta name="description" content="View and manage your Jellymint profile, token balance, and account settings.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      margin: 0;
      font-family: 'Outfit', sans-serif;
      padding: 20px;
      overflow-y: auto;
      color: var(--text-primary);
    }

    .profile-page {
      width: 100%;
      max-width: 600px;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 24px;
      padding: 10px 16px;
      border-radius: 10px;
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
    }
    .back-btn:hover {
      color: var(--primary-mint);
      background: rgba(16, 185, 129, 0.08);
      border-color: rgba(16, 185, 129, 0.2);
      transform: translateX(-2px);
    }

    /* Profile Header Card */
    .profile-header-card {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.12) 0%, rgba(6, 182, 212, 0.08) 50%, rgba(99, 102, 241, 0.08) 100%);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .profile-header-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
      animation: pulseGlow 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .profile-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--primary-mint);
      position: relative;
      z-index: 1;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #090d16;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.25);
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .profile-avatar .avatar-fallback {
      font-size: 3rem;
      color: var(--primary-mint);
    }

    .profile-name {
      font-size: 2rem;
      font-weight: 700;
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #fff 40%, var(--primary-mint) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .profile-email {
      color: var(--text-secondary);
      font-size: 1rem;
      position: relative;
      z-index: 1;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .stat-card:hover {
      border-color: rgba(16, 185, 129, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
    .stat-icon {
      font-size: 1.6rem;
      margin-bottom: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
    }
    .stat-icon.tokens {
      background: rgba(16, 185, 129, 0.12);
      color: var(--primary-mint);
    }
    .stat-icon.tier {
      background: rgba(99, 102, 241, 0.12);
      color: var(--accent-indigo);
    }
    .stat-value {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .stat-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    /* Info cards */
    .info-card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .info-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }
    .info-card h3 i {
      color: var(--primary-mint);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .info-row:first-of-type {
      padding-top: 0;
    }
    .info-label {
      color: var(--text-secondary);
      font-size: 0.92rem;
    }
    .info-value {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.92rem;
    }

    /* Tier badge */
    .tier-badge {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border: 1px solid transparent;
    }
    .tier-badge.free {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border-color: rgba(148, 163, 184, 0.15);
    }
    .tier-badge.pro {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border-color: rgba(59, 130, 246, 0.15);
    }
    .tier-badge.advanced {
      background: rgba(20, 184, 166, 0.1);
      color: var(--primary-mint);
      border-color: rgba(20, 184, 166, 0.15);
    }

    /* Buttons */
    .profile-actions {
      display: flex;
      gap: 16px;
    }
    .profile-btn {
      flex: 1;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      font-family: inherit;
    }
    .profile-btn.primary {
      background: linear-gradient(135deg, var(--primary-mint), var(--accent-cyan));
      color: #0f172a;
    }
    .profile-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35);
    }
    .profile-btn.danger {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    .profile-btn.danger:hover {
      background: rgba(239, 68, 68, 0.08);
      border-color: #ef4444;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.15);
    }

    /* Loading state */
    .profile-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 80px 0;
      color: var(--text-secondary);
    }
    .profile-loading i {
      color: var(--primary-mint);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-header-card { padding: 36px 24px; }
      .profile-name { font-size: 1.6rem; }
      .stats-row { grid-template-columns: 1fr; }
      .profile-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="profile-page">
    <!-- Back to Chat -->
    <a href="/chat/" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back to Chat
    </a>

    <!-- Loading -->
    <div id="profile-loading" class="profile-loading">
      <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
      <p>Loading your profile...</p>
    </div>

    <!-- Profile Content (hidden until loaded) -->
    <div id="profile-content" style="display: none;">
      <!-- Header Card -->
      <div class="profile-header-card">
        <div class="profile-avatar" id="profile-avatar">
          <i class="fa-solid fa-user avatar-fallback"></i>
        </div>
        <div class="profile-name" id="profile-name">Loading...</div>
        <div class="profile-email" id="profile-email">loading@email.com</div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon tokens">
            <i class="fa-solid fa-coins"></i>
          </div>
          <div class="stat-value" id="stat-tokens">--</div>
          <div class="stat-label">Token Balance</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon tier">
            <i class="fa-solid fa-crown"></i>
          </div>
          <div class="stat-value" id="stat-tier">--</div>
          <div class="stat-label">Account Tier</div>
        </div>
      </div>

      <!-- Daily Token Allowance Progress Bar -->
      <div class="info-card" id="token-usage-container" style="margin-bottom: 24px; display: none;">
        <h3 style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <span><i class="fa-solid fa-gauge-high"></i> Daily Token Allowance</span>
          <span id="token-percentage" style="font-size: 0.85rem; color: var(--primary-mint); font-weight: 700; background: rgba(20, 184, 166, 0.1); padding: 4px 10px; border-radius: 6px;">0% Remaining</span>
        </h3>
        <div class="progress-bar-wrapper" style="width: 100%; height: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 6px; overflow: hidden; margin-top: 15px; border: 1px solid rgba(255, 255, 255, 0.05); position: relative;">
          <div id="token-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--primary-mint)); border-radius: 6px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-top: 10px;">
          <span id="token-used-text">Remaining: 0 tokens</span>
          <span id="token-limit-text">Allowance: 0 tokens</span>
        </div>
      </div>

      <!-- Account Details -->
      <div class="info-card">
        <h3><i class="fa-solid fa-circle-info"></i> Account Details</h3>
        <div class="info-row">
          <span class="info-label">User ID</span>
          <span class="info-value" id="info-uid" style="font-family: var(--font-mono, monospace); font-size: 0.8rem; opacity: 0.7;">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="info-email">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Tier</span>
          <span class="info-value"><span class="tier-badge free" id="info-tier-badge">FREE</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">Last Active</span>
          <span class="info-value" id="info-last-active">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Account Created</span>
          <span class="info-value" id="info-created">--</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="profile-actions">
        <button class="profile-btn primary" id="back-to-chat-btn">
          <i class="fa-solid fa-comment-dots"></i> Back to Chat
        </button>
        <button class="profile-btn danger" id="sign-out-btn">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/profile.js"></script>
</body>
</html>
